<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Proforma360 - New Quotation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        /* Base typography utility for Material Symbols */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean PWA feel */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Safe area padding utilities */
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-container": "#eeefff",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#c1ffc5",
                        "inverse-surface": "#2d3133",
                        "outline-variant": "#c3c6d7",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-secondary-container": "#5c647a",
                        "secondary": "#565e74",
                        "primary-container": "#2563eb",
                        "primary": "#004ac6",
                        "tertiary-fixed-dim": "#4ae176",
                        "outline": "#737686",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed": "#dbe1ff",
                        "secondary-container": "#dae2fd",
                        "surface-container-highest": "#e0e3e5",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-background": "#191c1e",
                        "surface-bright": "#f7f9fb",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-container": "#007e37",
                        "surface-container": "#eceef0",
                        "on-tertiary-fixed": "#002109",
                        "tertiary-fixed": "#6bff8f",
                        "error": "#ba1a1a",
                        "tertiary": "#006229",
                        "on-primary-fixed": "#00174b",
                        "secondary-fixed": "#dae2fd",
                        "surface-dim": "#d8dadc",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#005321",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-secondary-fixed": "#131b2e",
                        "surface-tint": "#0053db",
                        "surface-container-high": "#e6e8ea",
                        "background": "#f7f9fb",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#434655"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "sidebar-width": "260px",
                        "2xl": "48px",
                        "lg": "24px",
                        "3xl": "64px",
                        "sm": "8px",
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "sidebar-collapsed": "72px",
                        "container-max": "1280px",
                        "base": "8px"
                    },
                    fontFamily: {
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    fontSize: {
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        "label-md": ["14px", { lineHeight: "1", fontWeight: "500" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "headline-sm": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "label-sm": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "1.2", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-sm antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Customized for sub-page per JSON tokens) -->
<!-- Suppression Logic Applied: BottomNavBar is hidden for this transactional sub-page -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-md h-[56px] bg-background border-b border-outline-variant pt-safe">
<button aria-label="Go back" class="h-10 w-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary active:scale-95 duration-150">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-background truncate px-2">New Quotation</h1>
<button aria-label="Preview" class="h-10 w-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-primary active:scale-95 duration-150">
<span class="material-symbols-outlined text-[24px]">visibility</span>
</button>
</header>
<!-- Main Content Form Area -->
<!-- Padding top accounts for header + safe area. Padding bottom accounts for sticky action bar -->
<main class="flex-1 overflow-y-auto px-md pt-[72px] pb-[140px] flex flex-col gap-lg">
<!-- Section: Client Info -->
<section class="flex flex-col gap-md">
<h2 class="font-label-sm text-label-sm uppercase tracking-wider text-outline">Client Information</h2>
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="client-select">Client</label>
<div class="relative">
<select class="appearance-none w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 rounded-lg px-md py-3 font-body-md text-body-md text-on-surface transition-colors" id="client-select">
<option disabled="" selected="" value="">Select a client</option>
<option value="acme">Acme Corp</option>
<option value="globex">Globex Inc.</option>
<option value="soylent">Soylent Corp</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-outline">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="quote-number">Quote Number</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-3 font-body-md text-body-md text-secondary cursor-not-allowed" id="quote-number" readonly="" type="text" value="QT-2023-0842"/>
</div>
</section>
<hr class="border-t border-outline-variant border-opacity-50"/>
<!-- Section: Dates -->
<section class="flex flex-col gap-md">
<h2 class="font-label-sm text-label-sm uppercase tracking-wider text-outline">Key Dates</h2>
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="issue-date">Issue Date</label>
<input class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 rounded-lg px-3 py-3 font-body-md text-body-md text-on-surface transition-colors" id="issue-date" type="date" value="2023-10-24"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="expiry-date">Expiry Date</label>
<input class="w-full bg-surface-container-low border border-transparent focus:border-primary focus:bg-surface-container-lowest focus:ring-0 rounded-lg px-3 py-3 font-body-md text-body-md text-on-surface transition-colors" id="expiry-date" type="date" value="2023-11-24"/>
</div>
</div>
</section>
<hr class="border-t border-outline-variant border-opacity-50"/>
<!-- Section: Items -->
<section class="flex flex-col gap-md">
<div class="flex justify-between items-end">
<h2 class="font-label-sm text-label-sm uppercase tracking-wider text-outline">Line Items</h2>
<span class="font-label-sm text-label-sm text-primary">2 Items</span>
</div>
<!-- Item List -->
<div class="flex flex-col gap-sm">
<!-- Item Card 1 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm active:bg-surface-container-low transition-colors touch-pan-y">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Enterprise License</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1">Annual subscription</span>
</div>
<button aria-label="Remove item" class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<div class="flex justify-between items-center mt-2 pt-2 border-t border-outline-variant border-opacity-30">
<div class="flex items-center gap-2">
<span class="font-body-sm text-body-sm text-secondary bg-surface-container py-1 px-2 rounded">Qty: 1</span>
<span class="font-body-sm text-body-sm text-secondary">x $12,000</span>
</div>
<span class="font-label-md text-label-md text-on-surface">$12,000.00</span>
</div>
</div>
<!-- Item Card 2 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md flex flex-col gap-sm active:bg-surface-container-low transition-colors touch-pan-y">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Implementation Services</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-1">Setup &amp; integration</span>
</div>
<button aria-label="Remove item" class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<div class="flex justify-between items-center mt-2 pt-2 border-t border-outline-variant border-opacity-30">
<div class="flex items-center gap-2">
<span class="font-body-sm text-body-sm text-secondary bg-surface-container py-1 px-2 rounded">Qty: 120 hrs</span>
<span class="font-body-sm text-body-sm text-secondary">x $85</span>
</div>
<span class="font-label-md text-label-md text-on-surface">$10,200.00</span>
</div>
</div>
</div>
<!-- Add Item Button -->
<button class="w-full h-12 mt-2 bg-surface-container-lowest border border-outline-variant border-dashed rounded-xl flex items-center justify-center gap-2 text-primary hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">add</span>
<span class="font-label-md text-label-md">Add Item</span>
</button>
</section>
</main>
<!-- Sticky Bottom Summary & Action -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant px-md py-md pb-safe z-40 shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]">
<div class="flex justify-between items-center mb-md">
<span class="font-body-lg text-body-lg text-on-surface-variant">Total Amount</span>
<span class="font-headline-md text-headline-md text-on-surface">$22,200.00</span>
</div>
<button class="w-full h-12 bg-primary text-on-primary rounded-full flex items-center justify-center font-label-md text-label-md hover:bg-primary-container transition-colors active:scale-[0.98] shadow-md shadow-primary/20">
            Review &amp; Send
        </button>
</div>
</body></html>
