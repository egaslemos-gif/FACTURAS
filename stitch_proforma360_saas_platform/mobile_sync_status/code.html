<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Sync Status - Proforma360</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "secondary": "#565e74",
                        "outline-variant": "#c3c6d7",
                        "on-tertiary-container": "#c1ffc5",
                        "error": "#ba1a1a",
                        "primary": "#004ac6",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed-dim": "#bec6e0",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#eeefff",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed": "#131b2e",
                        "on-tertiary-fixed-variant": "#005321",
                        "surface": "#f7f9fb",
                        "secondary-fixed": "#dae2fd",
                        "on-tertiary-fixed": "#002109",
                        "surface-container-highest": "#e0e3e5",
                        "primary-fixed-dim": "#b4c5ff",
                        "outline": "#737686",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-primary-fixed": "#00174b",
                        "on-background": "#191c1e",
                        "tertiary": "#006229",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "surface-container-high": "#e6e8ea",
                        "surface-container-low": "#f2f4f6",
                        "secondary-container": "#dae2fd",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed": "#6bff8f",
                        "on-secondary-container": "#5c647a",
                        "on-error": "#ffffff",
                        "tertiary-container": "#007e37",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef0",
                        "tertiary-fixed-dim": "#4ae176",
                        "surface-tint": "#0053db",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434655",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b4c5ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "base": "8px",
                        "sm": "8px",
                        "container-max": "1280px",
                        "sidebar-width": "260px",
                        "md": "16px",
                        "2xl": "48px",
                        "3xl": "64px",
                        "xl": "32px",
                        "xs": "4px",
                        "sidebar-collapsed": "72px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],

                        "label-md": ["Inter"],

                        "body-lg": ["Inter"]
                    },
                    "fontSize": {

                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]

                }
            }
        }

<style>
        .spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col pb-[100px]">
<!-- TopAppBar (Suppressed navigation shell as this is a transactional/status screen) -->
<header class="w-full top-0 sticky bg-surface-container-lowest border-b border-outline-variant flat no shadows transition-colors duration-150 ease-in-out z-40">
<div class="flex items-center px-md h-16 w-full max-w-container-max mx-auto relative">
<button class="absolute left-md p-2 rounded-full hover:bg-surface-variant/50 transition-colors duration-150 ease-in-out flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="w-full text-center">
<span class="font-headline-md text-headline-md font-bold text-primary">Proforma360</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-container-max mx-auto px-md py-lg flex flex-col gap-lg">
<!-- Status Card (Bento style) -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm p-lg flex flex-col items-center justify-center text-center gap-md">
<div class="relative w-24 h-24 flex items-center justify-center">
<!-- Outer glowing ring -->
<div class="absolute inset-0 rounded-full border-4 border-surface-container-high"></div>
<!-- Animated progress ring -->
<svg class="absolute inset-0 w-full h-full text-primary spin-slow" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-dasharray="200" stroke-dashoffset="50" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<span class="material-symbols-outlined text-primary text-4xl" data-icon="sync">sync</span>
</div>
<div class="flex flex-col gap-xs">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Syncing Data...</h1>
<p class="font-body-sm text-body-sm text-secondary">Last successful sync: Today at 09:41 AM</p>
</div>
<button class="mt-sm px-lg py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-label-md text-label-md hover:bg-surface-variant/50 transition-colors duration-150 shadow-[0_4px_6px_-1px_rgb(0,0,0,0.1),0_2px_4px_-2px_rgb(0,0,0,0.1)] active:scale-95">
                Cancel
            </button>
</section>
<!-- Offline Records List -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-sm text-label-sm text-secondary uppercase px-sm">Offline Records (3)</h2>
<div class="flex flex-col gap-base">
<!-- Record Item: Syncing -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md flex items-center justify-between shadow-sm">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="request_quote">request_quote</span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Quotation Q-2023-041</span>
<span class="font-body-sm text-body-sm text-secondary">Client: Acme Corp</span>
</div>
</div>
<div class="flex items-center gap-base">
<span class="px-2 py-1 rounded bg-primary/10 text-primary font-label-sm text-label-sm uppercase tracking-wider">Syncing</span>
<span class="material-symbols-outlined text-primary spin-slow text-lg" data-icon="progress_activity">progress_activity</span>
</div>
</div>
<!-- Record Item: Pending -->
<div class="bg-surface-container-lowest rounded-lg border border-outline-variant p-md flex items-center justify-between shadow-sm">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="group">group</span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Client Update</span>
<span class="font-body-sm text-body-sm text-secondary">Stark Industries</span>
</div>
</div>
<div class="flex items-center gap-base">
<span class="px-2 py-1 rounded bg-surface-variant text-secondary font-label-sm text-label-sm uppercase tracking-wider">Pending</span>
<span class="material-symbols-outlined text-secondary text-lg" data-icon="schedule">schedule</span>
</div>
</div>
<!-- Record Item: Conflict -->
<div class="bg-surface-container-lowest rounded-lg border border-error p-md flex items-center justify-between shadow-sm bg-error-container/20">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error">
<span class="material-symbols-outlined" data-icon="request_quote">request_quote</span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Quotation Q-2023-039</span>
<span class="font-body-sm text-body-sm text-error">Version conflict detected</span>
</div>
</div>
<div class="flex items-center gap-base">
<span class="px-2 py-1 rounded bg-error/10 text-error font-label-sm text-label-sm uppercase tracking-wider">Conflict</span>
<button class="p-1 rounded hover:bg-error/20 text-error transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="warning">warning</span>
</button>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area (Sticky to bottom above safe area) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant p-md pb-[env(safe-area-inset-bottom,16px)] z-40 shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]">
<button class="w-full h-10 rounded-lg bg-primary text-on-primary font-label-md text-label-md flex items-center justify-center gap-sm hover:bg-on-primary-fixed-variant transition-colors duration-150 shadow-[0_4px_6px_-1px_rgb(0,0,0,0.1),0_2px_4px_-2px_rgb(0,0,0,0.1)] active:scale-95">
<span class="material-symbols-outlined text-xl" data-icon="sync">sync</span>
            Sync Now
        </button>
</div>
</body></html>
