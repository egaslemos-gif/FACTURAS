<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Proforma360 - Quotation Builder</title>
<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e0e3e5",
                    "on-secondary-fixed": "#131b2e",
                    "surface-container-low": "#f2f4f6",
                    "surface-dim": "#d8dadc",
                    "on-tertiary": "#ffffff",
                    "primary-container": "#2563eb",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#005321",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "surface-bright": "#f7f9fb",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-container": "#007e37",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "on-secondary-fixed-variant": "#3f465c",
                    "primary-fixed": "#dbe1ff",
                    "tertiary-fixed-dim": "#4ae176",
                    "on-background": "#191c1e",
                    "tertiary-fixed": "#6bff8f",
                    "outline-variant": "#c3c6d7",
                    "secondary": "#565e74",
                    "on-secondary-container": "#5c647a",
                    "on-primary-fixed": "#00174b",
                    "on-surface": "#191c1e",
                    "inverse-primary": "#b4c5ff",
                    "surface-container": "#eceef0",
                    "on-tertiary-container": "#c1ffc5",
                    "error": "#ba1a1a",
                    "surface-tint": "#0053db",
                    "inverse-surface": "#2d3133",
                    "on-surface-variant": "#434655",
                    "on-error": "#ffffff",
                    "secondary-container": "#dae2fd",
                    "secondary-fixed-dim": "#bec6e0",
                    "outline": "#737686",
                    "error-container": "#ffdad6",
                    "inverse-on-surface": "#eff1f3",
                    "primary": "#004ac6",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-primary-container": "#eeefff",
                    "secondary-fixed": "#dae2fd",
                    "surface": "#f7f9fb",
                    "tertiary": "#006229",
                    "background": "#f7f9fb",
                    "on-tertiary-fixed": "#002109",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "2xl": "48px",
                    "sidebar-width": "260px",
                    "sidebar-collapsed": "72px",
                    "3xl": "64px",
                    "xl": "32px",
                    "xs": "4px",
                    "container-max": "1280px",
                    "sm": "8px",
                    "md": "16px",
                    "base": "8px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "1", "fontWeight": "500"}],
                    "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          }
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c3c6d7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #737686; }

        /* Input overrides for minimal corporate look */
        .minimal-input {
            background-color: theme('colors.surface-container-low');
            border: 1px solid transparent;
            transition: all 150ms ease;
        }
        .minimal-input:hover {
            background-color: theme('colors.surface-container-high');
        }
        .minimal-input:focus {
            background-color: theme('colors.surface-container-lowest');
            border-color: theme('colors.primary');
            outline: none;
            box-shadow: 0 0 0 2px theme('colors.primary-fixed');
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- Builder Header (Task-Focused, Navigation Suppressed) -->
<header class="sticky top-0 z-30 bg-surface-container-lowest/90 backdrop-blur-md border-b border-outline-variant h-16 px-lg flex items-center justify-between">
<div class="flex items-center gap-md">
<button aria-label="Back to Quotations" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">New Quotation</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1 uppercase">Draft Status</p>
</div>
</div>
<div class="flex items-center gap-sm">
<button class="h-10 px-md rounded-DEFAULT font-label-md text-label-md text-on-surface hover:bg-surface-container-high transition-colors flex items-center gap-sm border border-outline-variant">
<span class="material-symbols-outlined text-[18px]">save</span>
                Save Draft
            </button>
<button class="h-10 px-md rounded-DEFAULT font-label-md text-label-md text-on-surface hover:bg-surface-container-high transition-colors flex items-center gap-sm border border-outline-variant">
<span class="material-symbols-outlined text-[18px]">visibility</span>
                Preview PDF
            </button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-container-max mx-auto p-md lg:p-lg grid grid-cols-1 lg:grid-cols-12 gap-lg items-start">
<!-- Left Column: Form & Table (Takes 8 cols on desktop) -->
<div class="lg:col-span-8 flex flex-col gap-lg">
<!-- Header Details Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-lg shadow-sm">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-md">Quotation Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Client Selection -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Client</label>
<div class="relative">
<select class="minimal-input w-full h-10 px-md rounded-DEFAULT font-body-md text-body-md appearance-none">
<option disabled="" selected="" value="">Select a client...</option>
<option value="1">Acme Corporation</option>
<option value="2">Global Tech Industries</option>
<option value="3">Stark Enterprises</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">arrow_drop_down</span>
</div>
</div>
<!-- Quotation Number -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Quotation #</label>
<input class="minimal-input w-full h-10 px-md rounded-DEFAULT font-body-md text-body-md text-on-surface font-medium" type="text" value="QT-2024-0891"/>
</div>
<!-- Date -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Issue Date</label>
<div class="relative">
<input class="minimal-input w-full h-10 px-md rounded-DEFAULT font-body-md text-body-md text-on-surface" type="date"/>
</div>
</div>
<!-- Expiry -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Expiry Date</label>
<div class="relative">
<input class="minimal-input w-full h-10 px-md rounded-DEFAULT font-body-md text-body-md text-on-surface" type="date"/>
</div>
</div>
</div>
</section>
<!-- Line Items Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden flex flex-col">
<div class="p-md border-b border-outline-variant bg-surface-bright flex justify-between items-center">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Line Items</h2>
</div>
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse min-w-[600px]">
<thead>
<tr class="border-b border-outline-variant bg-surface-container-low">
<th class="p-sm font-label-sm text-label-sm text-on-surface-variant uppercase w-1/2">Description</th>
<th class="p-sm font-label-sm text-label-sm text-on-surface-variant uppercase w-24">Qty</th>
<th class="p-sm font-label-sm text-label-sm text-on-surface-variant uppercase w-32">Price</th>
<th class="p-sm font-label-sm text-label-sm text-on-surface-variant uppercase w-24">Tax %</th>
<th class="p-sm font-label-sm text-label-sm text-on-surface-variant uppercase text-right w-32">Total</th>
<th class="p-sm w-12 text-center"></th>
</tr>
</thead>
<tbody id="items-body">
<!-- Row 1 -->
<tr class="border-b border-outline-variant hover:bg-surface-bright transition-colors group">
<td class="p-sm">
<textarea class="minimal-input w-full p-sm rounded-DEFAULT font-body-sm text-body-sm resize-none" placeholder="Item description..." rows="2">Enterprise Software License - Annual</textarea>
</td>
<td class="p-sm align-top">
<input class="minimal-input w-full h-8 px-sm rounded-DEFAULT font-body-sm text-body-sm text-center" min="1" type="number" value="1"/>
</td>
<td class="p-sm align-top">
<input class="minimal-input w-full h-8 px-sm rounded-DEFAULT font-body-sm text-body-sm text-right" step="0.01" type="number" value="12500.00"/>
</td>
<td class="p-sm align-top">
<input class="minimal-input w-full h-8 px-sm rounded-DEFAULT font-body-sm text-body-sm text-center" max="100" min="0" type="number" value="20"/>
</td>
<td class="p-sm align-top font-body-md text-body-md text-on-surface font-medium text-right pt-3">
                                    $15,000.00
                                </td>
<td class="p-sm align-top text-center pt-2">
<button aria-label="Remove item" class="text-on-surface-variant hover:text-error transition-colors p-1 rounded-DEFAULT opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
<!-- Row 2 -->
<tr class="border-b border-outline-variant hover:bg-surface-bright transition-colors group">
<td class="p-sm">
<textarea class="minimal-input w-full p-sm rounded-DEFAULT font-body-sm text-body-sm resize-none" placeholder="Item description..." rows="2">Implementation and Setup Fee</textarea>
</td>
<td class="p-sm align-top">
<input class="minimal-input w-full h-8 px-sm rounded-DEFAULT font-body-sm text-body-sm text-center" min="1" type="number" value="40"/>
</td>
<td class="p-sm align-top">
<input class="minimal-input w-full h-8 px-sm rounded-DEFAULT font-body-sm text-body-sm text-right" step="0.01" type="number" value="150.00"/>
</td>
<td class="p-sm align-top">
<input class="minimal-input w-full h-8 px-sm rounded-DEFAULT font-body-sm text-body-sm text-center" max="100" min="0" type="number" value="20"/>
</td>
<td class="p-sm align-top font-body-md text-body-md text-on-surface font-medium text-right pt-3">
                                    $7,200.00
                                </td>
<td class="p-sm align-top text-center pt-2">
<button aria-label="Remove item" class="text-on-surface-variant hover:text-error transition-colors p-1 rounded-DEFAULT opacity-0 group-hover:opacity-100 focus:opacity-100">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</td>
</tr>
</tbody>
</table>
</div>
<div class="p-sm border-t border-outline-variant bg-surface-container-low">
<button class="h-8 px-sm rounded-DEFAULT font-label-md text-label-md text-primary hover:bg-primary-fixed transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">add</span>
                        Add Line Item
                    </button>
</div>
</section>
<!-- Notes Section -->
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant p-lg shadow-sm">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-sm">Terms &amp; Notes</h2>
<textarea class="minimal-input w-full p-md rounded-DEFAULT font-body-sm text-body-sm resize-y" placeholder="Enter terms of service, payment terms, or notes to the client..." rows="3">Payment due within 30 days of acceptance. Quotation valid for 15 days.</textarea>
</section>
</div>
<!-- Right Column: Summary & Final Actions (Takes 4 cols on desktop, sticky) -->
<div class="lg:col-span-4 flex flex-col gap-lg sticky top-[88px]">
<section class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden">
<div class="p-lg border-b border-outline-variant bg-surface-bright">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Summary</h2>
</div>
<div class="p-lg flex flex-col gap-md">
<!-- Calculations -->
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Subtotal</span>
<span class="font-body-md text-body-md text-on-surface">$18,500.00</span>
</div>
<div class="flex justify-between items-center group">
<span class="font-body-sm text-body-sm text-on-surface-variant">Discount</span>
<div class="flex items-center gap-xs">
<input class="minimal-input w-16 h-7 text-right px-1 rounded font-body-sm text-body-sm text-error bg-error-container/20 border-transparent focus:border-error" placeholder="0.00" type="text"/>
<span class="font-body-sm text-body-sm text-on-surface-variant">%</span>
</div>
</div>
<div class="flex justify-between items-center">
<span class="font-body-sm text-body-sm text-on-surface-variant">Tax (VAT)</span>
<span class="font-body-md text-body-md text-on-surface">$3,700.00</span>
</div>
<hr class="border-outline-variant my-sm"/>
<!-- Grand Total -->
<div class="flex justify-between items-end">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Grand Total</span>
<span class="font-display-lg text-display-lg text-on-surface text-3xl font-bold tracking-tight">$22,200.00</span>
</div>
</div>
<!-- Primary Actions -->
<div class="p-lg pt-0 flex flex-col gap-sm">
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm hover:bg-on-primary-fixed-variant transition-colors shadow-[0_4px_6px_-1px_rgb(0,0,0,0.1),0_2px_4px_-2px_rgb(0,0,0,0.1)]">
<span class="material-symbols-outlined text-[20px]">send</span>
                        Send to Client
                    </button>
<button class="w-full h-10 bg-[#25D366]/10 text-[#075E54] border border-[#25D366]/30 rounded-lg font-label-md text-label-md flex items-center justify-center gap-sm hover:bg-[#25D366]/20 transition-colors mt-sm">
<!-- Custom icon representation for whatsapp requirement -->
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.571-.012c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"></path></svg>
                        Share via WhatsApp
                    </button>
</div>
</section>
</div>
</main>
</body></html>
