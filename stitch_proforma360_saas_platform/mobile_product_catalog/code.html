<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Proforma360 - Product Catalog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "secondary": "#565e74",
                        "outline-variant": "#c3c6d7",
                        "on-tertiary-container": "#c1ffc5",
                        "error": "#ba1a1a",
                        "primary": "#004ac6",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed-dim": "#bec6e0",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#eeefff",
                        "inverse-surface": "#2d3133",
                        "on-secondary-fixed": "#131b2e",
                        "on-tertiary-fixed-variant": "#005321",
                        "surface": "#f7f9fb",
                        "secondary-fixed": "#dae2fd",
                        "on-tertiary-fixed": "#002109",
                        "surface-container-highest": "#e0e3e5",
                        "primary-fixed-dim": "#b4c5ff",
                        "outline": "#737686",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-primary-fixed": "#00174b",
                        "on-background": "#191c1e",
                        "tertiary": "#006229",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "surface-container-high": "#e6e8ea",
                        "surface-container-low": "#f2f4f6",
                        "secondary-container": "#dae2fd",
                        "inverse-on-surface": "#eff1f3",
                        "tertiary-fixed": "#6bff8f",
                        "on-secondary-container": "#5c647a",
                        "on-error": "#ffffff",
                        "tertiary-container": "#007e37",
                        "on-surface": "#191c1e",
                        "surface-container": "#eceef0",
                        "tertiary-fixed-dim": "#4ae176",
                        "surface-tint": "#0053db",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#434655",
                        "surface-dim": "#d8dadc",
                        "surface-bright": "#f7f9fb",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b4c5ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "base": "8px",
                        "sm": "8px",
                        "container-max": "1280px",
                        "sidebar-width": "260px",
                        "md": "16px",
                        "2xl": "48px",
                        "3xl": "64px",
                        "xl": "32px",
                        "xs": "4px",
                        "sidebar-collapsed": "72px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],

                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]

                },
            },
        }

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .pt-safe {
            padding-top: env(safe-area-inset-top, 0px);
        }
        /* Custom scrollbar for chips */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pt-safe pb-[80px]">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-background border-b border-outline-variant transition-colors duration-150 ease-in-out">
<div class="flex items-center justify-between px-md h-16 w-full max-w-container-max mx-auto">
<button aria-label="Menu" class="p-2 text-primary hover:bg-surface-variant/50 rounded-full transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Proforma360</h1>
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center overflow-hidden">
<span class="font-label-sm text-label-sm">U</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-container-max mx-auto px-md py-lg flex flex-col gap-md">
<!-- Header & Search -->
<div class="flex flex-col gap-base">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile">Product Catalog</h2>
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary" style="font-variation-settings: 'FILL' 0;">search</span>
<input class="w-full h-10 pl-10 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface focus:outline-none focus:border-primary focus:bg-surface-container-lowest transition-colors placeholder:text-secondary" placeholder="Search products, SKUs..." type="text"/>
</div>
</div>
<!-- Filter Chips -->
<div class="flex gap-sm overflow-x-auto hide-scrollbar pb-xs -mx-md px-md">
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-primary-container text-on-primary-container font-label-md text-label-md transition-colors">All Products</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant font-label-md text-label-md hover:bg-surface-variant transition-colors">Licenses</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant font-label-md text-label-md hover:bg-surface-variant transition-colors">Services</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full bg-surface-container-high text-on-surface-variant border border-outline-variant font-label-md text-label-md hover:bg-surface-variant transition-colors">Hardware</button>
</div>
<!-- Product List -->
<div class="flex flex-col gap-sm">
<!-- Card 1 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md flex items-center gap-md hover:shadow-md transition-shadow">
<div class="w-12 h-12 rounded bg-surface-container-low flex items-center justify-center text-primary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">key</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-sm text-headline-sm truncate">Enterprise Suite License</h3>
<div class="flex items-center gap-2 text-secondary font-body-sm mt-1">
<span class="px-2 py-0.5 rounded bg-surface-container-highest text-xs">LIC-ENT-01</span>
<span>•</span>
<span>Annual</span>
</div>
</div>
<div class="text-right shrink-0">
<span class="font-headline-sm text-headline-sm text-primary">$1,200.00</span>
</div>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md flex items-center gap-md hover:shadow-md transition-shadow">
<div class="w-12 h-12 rounded bg-surface-container-low flex items-center justify-center text-tertiary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">engineering</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-sm text-headline-sm truncate">Implementation Consulting</h3>
<div class="flex items-center gap-2 text-secondary font-body-sm mt-1">
<span class="px-2 py-0.5 rounded bg-surface-container-highest text-xs">SRV-IMP-HR</span>
<span>•</span>
<span>Hourly</span>
</div>
</div>
<div class="text-right shrink-0">
<span class="font-headline-sm text-headline-sm text-primary">$150.00</span>
</div>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md flex items-center gap-md hover:shadow-md transition-shadow">
<div class="w-12 h-12 rounded bg-surface-container-low flex items-center justify-center text-secondary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">router</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-sm text-headline-sm truncate">Secure Gateway Router V3</h3>
<div class="flex items-center gap-2 text-secondary font-body-sm mt-1">
<span class="px-2 py-0.5 rounded bg-surface-container-highest text-xs">HDW-RTR-V3</span>
<span>•</span>
<span>Unit</span>
</div>
</div>
<div class="text-right shrink-0">
<span class="font-headline-sm text-headline-sm text-primary">$450.00</span>
</div>
</div>
<!-- Card 4 -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md flex items-center gap-md hover:shadow-md transition-shadow">
<div class="w-12 h-12 rounded bg-surface-container-low flex items-center justify-center text-primary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cloud</span>
</div>
<div class="flex-1 min-w-0">
<h3 class="font-headline-sm text-headline-sm truncate">Cloud Storage 1TB Add-on</h3>
<div class="flex items-center gap-2 text-secondary font-body-sm mt-1">
<span class="px-2 py-0.5 rounded bg-surface-container-highest text-xs">LIC-CLD-1T</span>
<span>•</span>
<span>Monthly</span>
</div>
</div>
<div class="text-right shrink-0">
<span class="font-headline-sm text-headline-sm text-primary">$25.00</span>
</div>
</div>
</div>
</main>
<!-- FAB -->
<button aria-label="Add Product" class="fixed right-md bottom-[100px] w-14 h-14 bg-primary text-on-primary rounded-xl shadow-lg flex items-center justify-center active:scale-95 transition-transform z-40 hover:bg-primary/90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-lowest border-t border-outline-variant shadow-md">
<div class="flex justify-around items-center h-20 px-base pb-safe w-full max-w-container-max mx-auto">
<button aria-label="Dashboard" class="flex flex-col items-center justify-center text-secondary p-2 hover:bg-surface-container-high transition-colors duration-150 ease-in-out rounded-lg active:scale-95">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</button>
<button aria-label="Products" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span class="font-label-sm text-label-sm">Products</span>
</button>
<button aria-label="Quotes" class="flex flex-col items-center justify-center text-secondary p-2 hover:bg-surface-container-high transition-colors duration-150 ease-in-out rounded-lg active:scale-95">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">request_quote</span>
<span class="font-label-sm text-label-sm">Quotes</span>
</button>
<button aria-label="Clients" class="flex flex-col items-center justify-center text-secondary p-2 hover:bg-surface-container-high transition-colors duration-150 ease-in-out rounded-lg active:scale-95">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">group</span>
<span class="font-label-sm text-label-sm">Clients</span>
</button>
</div>
</nav>
</body></html>
