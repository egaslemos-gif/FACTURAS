<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proforma360 — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8ecf4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1e293b;
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }
    p {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #004ac6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { background: #003ea8; transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .hint {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.7);
      border-radius: 0.75rem;
      border: 1px solid #e2e8f0;
    }
    .hint p { font-size: 0.8rem; margin-bottom: 0; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sem Ligação à Internet</h1>
    <p>
      O Proforma360 precisa de uma ligação inicial para carregar os dados.
      Verifique a sua ligação e tente novamente.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Tentar Novamente
    </button>
    <div class="hint">
      <p>
        <strong>Dica:</strong> Depois de aceder uma vez com internet, o app funcionará offline 
        com os dados locais guardados no seu dispositivo.
      </p>
    </div>
  </div>
</body>
</html>
