<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proforma360 — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      max-width: 500px;
      width: 100%;
      padding: 2.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      text-align: center;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #1e293b;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      background: #0d9488;
      color: #ffffff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 0.75rem;
      text-decoration: none;
    }
    .btn:hover { background: #0f766e; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent;
      color: #475569;
      border: 1px solid #cbd5e1;
    }
    .btn-secondary:hover { background: #f1f5f9; color: #0f172a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☁️ 🔌</div>
    <h1>Sem Ligação à Internet</h1>
    <p>
      Parece que o seu dispositivo está offline e esta página não foi guardada em cache. Verifique a sua ligação para continuar a usar o Proforma360 ou volte ao seu ecrã principal.
    </p>
    
    <div>
      <a href="/dashboard" class="btn">
        Ir para o Painel Principal
      </a>
      <button class="btn btn-secondary" onclick="window.location.reload()">
        Tentar Recarregar a Página
      </button>
    </div>
  </div>

  <script>
    // Fallback logic for when next.js Router tries to fetch RSC data and gets this HTML instead
    // The fetch request usually fails JSON parsing, so we intercept it by checking headers.
    // If we're loaded in an iframe or via fetch, we can't do much, but we can detect it.
  </script>
</body>
</html>
